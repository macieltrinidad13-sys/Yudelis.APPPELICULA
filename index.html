<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - TMDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar sticky-top navbar-dark py-3">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <h1 class="navbar-brand fs-2 fw-bold m-0"><i class="fa-solid fa-film text-warning"></i> CineStream</h1>
            
            <div class="search-box mt-3 mt-md-0">
                <input type="text" id="searchInput" placeholder="Buscar película..." class="form-control bg-dark text-white border-secondary">
                <div id="autocomplete-results" class="autocomplete-list d-none"></div>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <h2 id="sectionTitle" class="text-white mb-4">Películas Populares</h2>
        
        <div id="movieGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            </div>

        <nav class="mt-5">
            <ul class="pagination justify-content-center custom-pagination">
                <li class="page-item"><button class="page-link" id="prevPage">Anterior</button></li>
                <li class="page-item disabled"><span class="page-link text-white bg-dark" id="currentPage">1</span></li>
                <li class="page-item"><button class="page-link" id="nextPage">Siguiente</button></li>
            </ul>
        </nav>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
